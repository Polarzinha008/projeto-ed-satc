services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}"]
      interval: 5s
      retries: 5

  airflow-init:
    build: .
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: "chave_secreta_projeto_ed"
    command: bash -c "airflow db migrate && airflow users create --username admin --password ${DB_PASSWORD} --firstname Admin --lastname Admin --role Admin --email admin@example.com || true"

  airflow-webserver:
    build: .
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: "chave_secreta_projeto_ed"
      _PIP_ADDITIONAL_REQUIREMENTS: "pyspark==3.5.1 delta-spark==3.1.0 boto3"
    volumes:
      - ../src/dags:/opt/airflow/dags
      - ../src/pipeline:/opt/airflow/pipeline
      - ../dados_origem:/opt/airflow/dados_origem
    ports:
      - "8080:8080"
    command: webserver
    restart: always

  airflow-scheduler:
    build: .
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: "chave_secreta_projeto_ed"
      _PIP_ADDITIONAL_REQUIREMENTS: "pyspark==3.5.1 delta-spark==3.1.0 boto3"
    volumes:
      - ../src/dags:/opt/airflow/dags
      - ../src/pipeline:/opt/airflow/pipeline
      - ../dados_origem:/opt/airflow/dados_origem
    command: scheduler
    restart: always

  dashboard:
    build: ../dashboard
    container_name: dashboard-ecommerce
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      DATALAKE_BUCKET: datalake
      DASHBOARD_PREFIX: published/dashboard
    ports:
      - "8501:8501"
    restart: always

volumes:
  minio_data:
  postgres_data:
